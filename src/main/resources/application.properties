spring.application.name=JasperReportWithSpringBoot-3

# ======================================================
# =============   DATABASE CONFIGURATION   =============
# ======================================================
spring.datasource.url=jdbc:mysql://localhost:3306/reportDb?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# Optional connection pool tuning (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

# ======================================================
# =============   JPA / HIBERNATE CONFIG   =============
# ======================================================
#spring.jpa.hibernate.ddl-auto=none
#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ======================================================
# =============   JASPER REPORTS CONFIG   ==============
# ======================================================
# Directory to store compiled .jasper files (optional)
jasper.report.path=classpath:/reports/

# ======================================================
# =============   LOGGING CONFIGURATION   ==============
# ======================================================
logging.level.org.springframework.web=INFO
logging.level.com.example=DEBUG
logging.file.name=logs/jasper-report-demo.log

# ======================================================
# =============   SWAGGER / OPENAPI CONFIG  ============
# ======================================================
# SpringDoc automatically detects all REST controllers
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs